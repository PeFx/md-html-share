<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Share Viewer</title>
  <style>
    :root {
      --bg: #f6efe3;
      --panel: rgba(255, 250, 241, 0.82);
      --panel-strong: rgba(255, 247, 235, 0.96);
      --text: #3f352d;
      --muted: #7e6f64;
      --accent: #ff6b8a;
      --accent-2: #f59b6a;
      --accent-3: #e6b94b;
      --accent-soft: rgba(255, 107, 138, 0.12);
      --line: rgba(107, 84, 63, 0.14);
      --line-strong: rgba(107, 84, 63, 0.22);
      --code-bg: rgba(120, 96, 71, 0.08);
      --quote-bg: rgba(255, 255, 255, 0.42);
      --shadow: 0 20px 60px rgba(126, 97, 61, 0.10);
      --radius: 20px;
      --content-width: 860px;
      --mono: "SFMono-Regular", "JetBrains Mono", "Menlo", monospace;
      --serif: "Iowan Old Style", "Palatino Linotype", "Noto Serif SC", serif;
      --sans: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 30%),
        radial-gradient(circle at top right, rgba(255, 187, 146, 0.18), transparent 26%),
        linear-gradient(180deg, #f8f1e6 0%, #f4ebdf 48%, #f1e5d6 100%);
      color: var(--text);
      font-family: var(--serif);
    }

    body {
      padding: 28px;
    }

    .shell {
      max-width: 1440px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 420px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: var(--radius);
    }

    .controls {
      position: sticky;
      top: 24px;
      padding: 22px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font: 600 12px/1.2 var(--sans);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font: 700 30px/1.15 var(--sans);
      letter-spacing: -0.02em;
    }

    .intro {
      margin: 12px 0 18px;
      color: var(--muted);
      font: 500 14px/1.75 var(--sans);
    }

    .intro strong {
      color: #4d352d;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    button,
    .file-button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: white;
      color: var(--text);
      font: 600 13px/1 var(--sans);
      cursor: pointer;
      box-shadow: inset 0 0 0 1px var(--line);
      transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    button:hover,
    .file-button:hover {
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px rgba(255, 107, 138, 0.25);
      background: #fffdfa;
    }

    button.primary {
      background: linear-gradient(135deg, #ff7d96, #ff9472);
      color: white;
      box-shadow: none;
    }

    .file-button input {
      display: none;
    }

    .field {
      margin-top: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font: 700 13px/1 var(--sans);
      color: var(--muted);
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.56);
      color: var(--text);
      font: 500 14px/1.7 var(--sans);
      padding: 14px 16px;
      outline: none;
      transition: border-color 120ms ease, background 120ms ease;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: rgba(255, 107, 138, 0.38);
      background: rgba(255, 255, 255, 0.78);
    }

    textarea {
      min-height: 55vh;
      resize: vertical;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
    }

    .meta {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--accent-soft);
      color: #83515d;
      font: 600 12px/1.6 var(--sans);
    }

    .preview-wrap {
      padding: 22px;
      position: relative;
    }

    .preview-topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 4px 4px 18px;
      color: var(--muted);
      font: 600 13px/1 var(--sans);
    }

    .preview-topbar::after {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      top: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line-strong), transparent);
    }

    .preview {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 44px 52px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.34), transparent 120px),
        var(--panel-strong);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.75);
    }

    .markdown-body {
      font-size: 21px;
      line-height: 1.9;
      word-break: break-word;
      position: relative;
    }

    .markdown-body > *:first-child {
      margin-top: 0;
    }

    .markdown-body > *:last-child {
      margin-bottom: 0;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      margin: 1.7em 0 0.65em;
      font-family: var(--sans);
      line-height: 1.3;
      letter-spacing: -0.02em;
      color: #ff6686;
    }

    .markdown-body h1 {
      font-size: 2em;
      padding-bottom: 0.3em;
      border-bottom: 1px solid rgba(255, 107, 138, 0.18);
    }

    .markdown-body h2 {
      font-size: 1.55em;
      position: relative;
      padding-left: 0.7em;
    }

    .markdown-body h2::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.2em;
      bottom: 0.18em;
      width: 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
    }

    .markdown-body h3 {
      font-size: 1.28em;
      color: #ee7f58;
    }

    .markdown-body h4 {
      font-size: 1.08em;
      color: #9c6a57;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .markdown-body p,
    .markdown-body ul,
    .markdown-body ol,
    .markdown-body blockquote,
    .markdown-body table,
    .markdown-body pre {
      margin: 0 0 1.1em;
    }

    .markdown-body ul,
    .markdown-body ol {
      padding-left: 1.5em;
    }

    .markdown-body ul li::marker {
      color: var(--accent);
    }

    .markdown-body ol li::marker {
      color: #e58263;
      font-weight: 700;
    }

    .markdown-body li + li {
      margin-top: 0.35em;
    }

    .markdown-body a {
      color: #d84b6b;
      text-decoration: none;
      border-bottom: 1px solid rgba(216, 75, 107, 0.25);
    }

    .markdown-body strong {
      color: #2f2620;
    }

    .markdown-body em {
      color: #a65d47;
    }

    .markdown-body code {
      padding: 0.15em 0.42em;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255, 196, 143, 0.2), var(--code-bg));
      font: 0.82em/1.4 var(--mono);
      color: #9c4f38;
    }

    .markdown-body pre {
      padding: 18px 20px;
      overflow: auto;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 214, 177, 0.25), transparent 42px),
        #fffaf3;
      box-shadow: inset 0 0 0 1px rgba(127, 100, 73, 0.1);
    }

    .markdown-body pre code {
      padding: 0;
      background: transparent;
      border-radius: 0;
      font-size: 0.78em;
      color: #5c4a3e;
    }

    .markdown-body blockquote {
      padding: 14px 18px;
      border-left: 4px solid rgba(255, 107, 138, 0.46);
      border-radius: 0 16px 16px 0;
      background:
        linear-gradient(90deg, rgba(255, 157, 110, 0.1), transparent 70%),
        var(--quote-bg);
      color: #695c52;
    }

    .markdown-body hr {
      border: 0;
      height: 1px;
      margin: 1.8em 0;
      background: linear-gradient(90deg, transparent, rgba(107, 84, 63, 0.22), transparent);
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.48);
      font-size: 0.9em;
    }

    .markdown-body th,
    .markdown-body td {
      padding: 12px 14px;
      text-align: left;
      border: 1px solid rgba(107, 84, 63, 0.12);
      vertical-align: top;
    }

    .markdown-body th {
      background: linear-gradient(180deg, rgba(255, 229, 204, 0.8), rgba(255, 255, 255, 0.55));
      font-family: var(--sans);
      color: #8c5848;
    }

    .markdown-body tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.22);
    }

    .markdown-body img {
      max-width: 100%;
      display: block;
      margin: 1.2em auto;
      border-radius: 18px;
      box-shadow: 0 12px 36px rgba(78, 58, 40, 0.12);
    }

    .empty {
      padding: 44px 18px;
      text-align: center;
      color: var(--muted);
      font: 500 15px/1.8 var(--sans);
    }

    .empty::before {
      content: "Preview";
      display: inline-block;
      margin-bottom: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255, 107, 138, 0.1);
      color: var(--accent);
      font: 700 11px/1 var(--sans);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @media (max-width: 1080px) {
      body {
        padding: 18px;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }

      textarea {
        min-height: 34vh;
      }
    }

    @media (max-width: 720px) {
      .preview-wrap,
      .controls {
        padding: 16px;
      }

      .preview {
        padding: 28px 20px;
        border-radius: 22px;
      }

      .markdown-body {
        font-size: 18px;
        line-height: 1.8;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="card controls">
      <p class="eyebrow">Shareable Markdown</p>
      <h1>Markdown 转分享页</h1>
      <p class="intro">
        把你的 Markdown 粘进来，或者直接导入 `.md` 文件。右侧会按一个轻量、接近 Obsidian 阅读感的样式渲染，并且可以导出成独立 HTML 发给别人。
      </p>

      <div class="toolbar">
        <label class="file-button">
          导入 .md
          <input id="fileInput" type="file" accept=".md,.markdown,.txt" />
        </label>
        <button id="sampleButton" type="button">填入示例</button>
        <button id="clearButton" type="button">清空</button>
        <button id="exportButton" class="primary" type="button">导出 HTML</button>
      </div>

      <div class="field">
        <label for="docTitle">文档标题</label>
        <input id="docTitle" type="text" value="分享文档" />
      </div>

      <div class="field">
        <label for="markdownInput">Markdown 内容</label>
        <textarea id="markdownInput" spellcheck="false" placeholder="# 标题&#10;&#10;把 Markdown 粘贴到这里"></textarea>
      </div>

      <div class="meta" id="status">
        等你贴入 Markdown。导出后的文件是静态 HTML，别人双击就能看，不需要 Markdown 渲染器。
      </div>
    </section>

    <section class="card preview-wrap">
      <div class="preview-topbar">
        <span id="previewTitle">分享文档</span>
        <span id="wordCount">0 字符</span>
      </div>
      <article class="preview">
        <div id="preview" class="markdown-body">
          <div class="empty">这里会显示渲染结果</div>
        </div>
      </article>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const input = document.getElementById("markdownInput");
    const titleInput = document.getElementById("docTitle");
    const preview = document.getElementById("preview");
    const previewTitle = document.getElementById("previewTitle");
    const wordCount = document.getElementById("wordCount");
    const status = document.getElementById("status");
    const fileInput = document.getElementById("fileInput");

    const pageStyles = document.querySelector("style").textContent;

    const sampleMarkdown = `# Skill 优化说明

这是一个适合分享给其他人的 HTML 阅读版本。你可以继续保留 Obsidian 里的编辑体验，再导出给没有 Markdown 阅读环境的人。

## 1. 目标

- 保留标题层级、列表、表格、代码块
- 让阅读感接近笔记工具，而不是生硬的默认网页
- 导出成独立 HTML，双击即可打开

## 2. 输入结构

1. 当前 base skill 是谁
2. 当前最好指标和 threshold
3. 上一轮 FP/FN 明细
4. 必须保住的 bad case 模式
5. 必须压下去的 good/FP case 模式

> 这类块引用很适合放“结论”或“提醒”。

\`\`\`json
{
  "skill": "optimizer-v12",
  "target": "stable markdown output",
  "threshold": 56
}
\`\`\`

## 3. Case 对比

| case | truth | v8 | v11 | 结论 |
| --- | --- | ---: | ---: | --- |
| 508500... | bad | 48 | 53 | 应保留在阈值上方 |
| 523543... | good | 58 | 52 | 应压到阈值下方 |

最后你点一下右上角“导出 HTML”，就能得到一份适合转发的静态页面。`;

    marked.setOptions({
      breaks: true,
      gfm: true
    });

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function render() {
      const markdown = input.value.trim();
      const title = titleInput.value.trim() || "分享文档";

      previewTitle.textContent = title;
      wordCount.textContent = `${input.value.length} 字符`;

      if (!markdown) {
        preview.innerHTML = '<div class="empty">这里会显示渲染结果</div>';
        status.textContent = "等你贴入 Markdown。导出后的文件是静态 HTML，别人双击就能看，不需要 Markdown 渲染器。";
        return;
      }

      preview.innerHTML = marked.parse(markdown);
      status.textContent = "渲染已更新。你现在可以直接导出为单文件 HTML。";
      document.title = title;
    }

    function buildStandaloneHtml(title, markdown) {
      const rendered = marked.parse(markdown);

      return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${escapeHtml(title)}</title>
  <style>${pageStyles}</style>
</head>
<body>
  <div class="shell" style="display:block;max-width:1100px;">
    <section class="card preview-wrap" style="padding:28px;">
      <div class="preview-topbar">
        <span>${escapeHtml(title)}</span>
        <span>Shared HTML</span>
      </div>
      <article class="preview">
        <div class="markdown-body">${rendered}</div>
      </article>
    </section>
  </div>
</body>
</html>`;
    }

    function exportHtml() {
      const markdown = input.value.trim();
      const title = titleInput.value.trim() || "分享文档";

      if (!markdown) {
        status.textContent = "还没有内容可导出。先粘贴或导入 Markdown。";
        return;
      }

      const html = buildStandaloneHtml(title, markdown);
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const safeName = title.replace(/[\\/:*?\"<>|]+/g, "-").trim() || "share-doc";

      link.href = url;
      link.download = `${safeName}.html`;
      link.click();

      URL.revokeObjectURL(url);
      status.textContent = "独立 HTML 已导出。这个文件可以直接发给别人打开。";
    }

    input.addEventListener("input", render);
    titleInput.addEventListener("input", render);

    document.getElementById("sampleButton").addEventListener("click", () => {
      titleInput.value = "Skill 优化说明";
      input.value = sampleMarkdown;
      render();
    });

    document.getElementById("clearButton").addEventListener("click", () => {
      input.value = "";
      render();
    });

    document.getElementById("exportButton").addEventListener("click", exportHtml);

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) {
        return;
      }

      const text = await file.text();
      input.value = text;
      titleInput.value = file.name.replace(/\.[^.]+$/, "") || "分享文档";
      render();
      status.textContent = `已导入 ${file.name}。如果效果满意，直接导出 HTML 即可。`;
    });

    render();
  </script>
</body>
</html>
